  <text x="70" y="160" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (a) [4 marks]</text><text x="70" y="190" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Begin from the required statement context: A pile has 20 cans in the bottom row. Show</text><text x="70" y="220" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">that the pile contains 210 cans. (4).</text><text x="70" y="250" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply valid identities and simplify each line clearly.</text><text x="70" y="280" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 3: Arrive exactly at the target expression with no missing steps.</text><text x="70" y="310" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Conclusion: required result shown.</text><text x="70" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="370" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (b) [4 marks]</text><text x="70" y="400" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Parse the requirement from the prompt: There are 3240 cans in a pile. How many cans</text><text x="70" y="430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">are in the bottom row? (4).</text><text x="70" y="460" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply the main method with full algebraic working.</text><text x="70" y="490" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 3: Simplify and verify any stated restrictions.</text><text x="70" y="520" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Final answer: provide the required result clearly.</text><text x="70" y="550" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="580" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (c) [6 marks]</text><text x="70" y="610" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Begin from the required statement context: (i) There are S cans and they are</text><text x="70" y="640" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">organized in a triangular pile with n cans in the bottom row. Show that n2 + n − 2S = .</text><text x="70" y="670" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply valid identities and simplify each line clearly.</text><text x="70" y="700" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 3: Arrive exactly at the target expression with no missing steps.</text><text x="70" y="730" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Conclusion: required result shown.</text>
