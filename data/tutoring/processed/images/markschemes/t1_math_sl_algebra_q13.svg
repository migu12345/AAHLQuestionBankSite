  <text x="70" y="160" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (a) [1 marks]</text><text x="70" y="190" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Identify the sequence model from the prompt (Write down the 10th term of the</text><text x="70" y="220" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">sequence. Do not simplify your answer. (1)).</text><text x="70" y="250" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Use the relevant nth-term/sum formula and substitute known values.</text><text x="70" y="280" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Final answer: requested sequence value.</text><text x="70" y="310" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (b) [4 marks]</text><text x="70" y="370" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Identify the sequence model from the prompt (Find the sum of the infinite sequence.</text><text x="70" y="400" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">(4) (Total 5 marks)).</text><text x="70" y="430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Use the relevant nth-term/sum formula and substitute known values.</text><text x="70" y="460" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 3: Solve for the required term/index/sum and simplify.</text><text x="70" y="490" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Final answer: requested sequence value.</text>
