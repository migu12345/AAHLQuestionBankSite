  <text x="70" y="160" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">10.</text><text x="70" y="190" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">(a)</text><text x="70" y="220" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">(i)  uₙ=u₁+(n-1)d</text><text x="70" y="250" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">(ii)  Sₙ=n/2[2u₁+(n-1)d]</text><text x="70" y="280" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">(iii)  uₙ=u₁r^(n-1), Sₙ=u₁(1-rⁿ)/(1-r)</text>
