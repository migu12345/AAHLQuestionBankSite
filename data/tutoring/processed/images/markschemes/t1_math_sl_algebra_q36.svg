<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1140" viewBox="0 0 1400 1140">
  <rect x="20" y="20" width="1360" height="1100" rx="18" ry="18" fill="#f5f7fb" stroke="#c6cfdf" stroke-width="2"/>
  <rect x="20" y="20" width="1360" height="54" rx="18" ry="18" fill="#e7eef9" stroke="#c6cfdf" stroke-width="2"/>
  <text x="50" y="57" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#213a6a">Markscheme answer</text>
  <text x="70" y="110" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#243451">Q36</text>
  <text x="70" y="160" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">Part (a)</text><text x="70" y="190" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 1 (general term)</text><text x="70" y="220" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Given: Expand (2 + x)4 and simplify your result.</text><text x="70" y="250" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Use Tᵣ₊₁ = C(n,r) · a^(n-r) · b^r.</text><text x="70" y="280" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Match powers to find r (for required xᵏ term).</text><text x="70" y="310" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Substitute r and simplify coefficient + term.</text><text x="70" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Write final required term/coefficient.</text><text x="70" y="370" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="400" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 2 (partial expansion)</text><text x="70" y="430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Expand only the needed leading terms and read required coefficient.</text><text x="70" y="460" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Cross-check with METHOD 1 result.</text><text x="70" y="490" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="520" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Worked answer</text><text x="70" y="550" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">(x + 2)⁴ = 16 + 32x + 24x² + 8x³ + x⁴</text><text x="70" y="580" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Answer: 16 + 32x + 24x² + 8x³ + x⁴</text><text x="70" y="610" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="640" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">Part (b)</text><text x="70" y="670" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 1 (general term)</text><text x="70" y="700" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Given: Hence, find the term in x² in (2 + x)4 2 11 x .</text><text x="70" y="730" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Use Tᵣ₊₁ = C(n,r) · a^(n-r) · b^r.</text><text x="70" y="760" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Match powers to find r (for required xᵏ term).</text><text x="70" y="790" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Substitute r and simplify coefficient + term.</text><text x="70" y="820" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Write final required term/coefficient.</text><text x="70" y="850" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="880" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 2 (partial expansion)</text><text x="70" y="910" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Expand only the needed leading terms and read required coefficient.</text><text x="70" y="940" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Cross-check with METHOD 1 result.</text><text x="70" y="970" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="1000" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Worked answer</text><text x="70" y="1030" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">T = C(4,2)·2²·x²</text><text x="70" y="1060" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">T = 24x²</text><text x="70" y="1090" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Answer: 24x²</text>
</svg>