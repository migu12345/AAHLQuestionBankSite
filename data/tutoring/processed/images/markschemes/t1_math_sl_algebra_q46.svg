<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600">
  <rect x="20" y="20" width="1360" height="560" rx="18" ry="18" fill="#f5f7fb" stroke="#c6cfdf" stroke-width="2"/>
  <rect x="20" y="20" width="1360" height="54" rx="18" ry="18" fill="#e7eef9" stroke="#c6cfdf" stroke-width="2"/>
  <text x="50" y="57" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#213a6a">Markscheme answer</text>
  <text x="70" y="110" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#243451">Q46</text>
  <text x="70" y="160" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">Part (a)</text><text x="70" y="190" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 1 (general term)</text><text x="70" y="220" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">46. When the expression (2 + ax)10 is expanded, the coefficient of the term in x³ is 414 720.</text><text x="70" y="250" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Find the value of a. Worki</text><text x="70" y="280" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Use Tᵣ₊₁ = C(n,r) · a^(n-r) · b^r.</text><text x="70" y="310" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">match power(x): n-r = k  or  r = k</text><text x="70" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">substitute r</text><text x="70" y="370" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">simplify coefficient and term</text><text x="70" y="400" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">∴ required term/coefficient</text><text x="70" y="430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="460" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 2 (partial expansion)</text><text x="70" y="490" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">(a+b)ⁿ = ... + ... + ...</text><text x="70" y="520" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">read xᵏ term directly</text><text x="70" y="550" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">⇒ same result</text>
</svg>