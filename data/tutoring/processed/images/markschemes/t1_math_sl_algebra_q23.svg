  <text x="70" y="160" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (a) [2 marks]</text><text x="70" y="190" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Begin from the required statement context: Show that f(x) = log3 2x. (2).</text><text x="70" y="220" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply valid identities and simplify each line clearly.</text><text x="70" y="250" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Conclusion: required result shown.</text><text x="70" y="280" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="310" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (b) [3 marks]</text><text x="70" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Apply log/exponential laws to the given expression: Find the value of f(0.5) and of</text><text x="70" y="370" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">f(4.5). (3) The function f can also be written in the form f(x) = b ax ln ln ..</text><text x="70" y="400" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Convert to a solvable equation and isolate the variable.</text><text x="70" y="430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 3: Check all domain restrictions (log arguments &gt; 0).</text><text x="70" y="460" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Final answer: valid value(s) only.</text><text x="70" y="490" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="520" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (c) [6 marks]</text><text x="70" y="550" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Parse the requirement from the prompt: (i) Write down the value of a and of b. (ii)</text><text x="70" y="580" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Hence on graph paper, sketch the graph of f, for –5 ≤ x ≤ 5, –5 ≤ y ≤ 5, us.</text><text x="70" y="610" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply the main method with full algebraic working.</text><text x="70" y="640" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 3: Simplify and verify any stated restrictions.</text><text x="70" y="670" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Final answer: provide the required result clearly.</text><text x="70" y="700" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="730" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (d) [0 marks]</text><text x="70" y="760" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Parse the requirement from the prompt: Write down the value of f–1(0). (1) The point</text><text x="70" y="790" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">A lies on the graph of f. At A, x = 4.5..</text><text x="70" y="820" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply the main method with full algebraic working.</text><text x="70" y="850" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Final answer: provide the required result clearly.</text><text x="70" y="880" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="910" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (e) [1 marks]</text><text x="70" y="940" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Parse the requirement from the prompt: On your diagram, sketch the graph of f–1,</text><text x="70" y="970" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">noting clearly the image of point A. (4) (Total 16 marks).</text><text x="70" y="1000" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply the main method with full algebraic working.</text><text x="70" y="1030" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Final answer: provide the required result clearly.</text>
