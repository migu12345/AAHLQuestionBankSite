<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="930" viewBox="0 0 1400 930">
  <rect x="20" y="20" width="1360" height="890" rx="18" ry="18" fill="#f5f7fb" stroke="#c6cfdf" stroke-width="2"/>
  <rect x="20" y="20" width="1360" height="54" rx="18" ry="18" fill="#e7eef9" stroke="#c6cfdf" stroke-width="2"/>
  <text x="50" y="57" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#213a6a">Markscheme answer</text>
  <text x="70" y="110" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#243451">Q6</text>
  <text x="70" y="160" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">Part (a)</text><text x="70" y="190" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 1 (Cartesian form)</text><text x="70" y="220" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">w = 2 z ;</text><text x="70" y="250" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">z = a + bi,  z̄ = a - bi</text><text x="70" y="280" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">|z| = √(a²+b²),  arg(z)=atan(b/a) (+ quadrant)</text><text x="70" y="310" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Re(z)=..., Im(z)=...</text><text x="70" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">∴ final form</text><text x="70" y="370" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="400" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 2 (polar form)</text><text x="70" y="430" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Write z = r(cosθ + i sinθ) = r cisθ.</text><text x="70" y="460" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">zⁿ = rⁿ cis(nθ)</text><text x="70" y="490" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">convert to a+bi if required</text><text x="70" y="520" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="550" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">Part (b)</text><text x="70" y="580" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 1 (Cartesian form)</text><text x="70" y="610" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Re ( zw) = 2 Im(zw).</text><text x="70" y="640" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">z = a + bi,  z̄ = a - bi</text><text x="70" y="670" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">|z| = √(a²+b²),  arg(z)=atan(b/a) (+ quadrant)</text><text x="70" y="700" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Re(z)=..., Im(z)=...</text><text x="70" y="730" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">∴ final form</text><text x="70" y="760" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="790" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 2 (polar form)</text><text x="70" y="820" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Write z = r(cosθ + i sinθ) = r cisθ.</text><text x="70" y="850" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">zⁿ = rⁿ cis(nθ)</text><text x="70" y="880" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">convert to a+bi if required</text>
</svg>