  <text x="70" y="160" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (a) [2 marks]</text><text x="70" y="190" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Begin from the required statement context: Show that sin 2 nx = sin((2n + 1)x) cos x</text><text x="70" y="220" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">– cos((2n + 1)x) sin x. (2).</text><text x="70" y="250" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply valid identities and simplify each line clearly.</text><text x="70" y="280" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Conclusion: required result shown.</text><text x="70" y="310" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (b) [12 marks]</text><text x="70" y="370" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Begin from the required statement context: Hence prove, by induction, that cos x +</text><text x="70" y="400" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">cos 3x + cos 5x + ... + cos((2n – 1)x) = x nx sin2 2sin , for all n  +, sin x ≠.</text><text x="70" y="430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply valid identities and simplify each line clearly.</text><text x="70" y="460" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 3: Arrive exactly at the target expression with no missing steps.</text><text x="70" y="490" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Conclusion: required result shown.</text><text x="70" y="520" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="550" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (c) [6 marks]</text><text x="70" y="580" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Start from the given equation (Solve the equation cos x + cos 3x = 2 1 , 0 &lt; x &lt; π.</text><text x="70" y="610" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">(6) (Total 20 marks)) and rearrange into a standard form.</text><text x="70" y="640" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Use substitution/factorisation/inverse operations to isolate the unknown.</text><text x="70" y="670" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 3: Solve all candidates and reject invalid roots using stated restrictions.</text><text x="70" y="700" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Final answer: state the valid solution set only.</text>
