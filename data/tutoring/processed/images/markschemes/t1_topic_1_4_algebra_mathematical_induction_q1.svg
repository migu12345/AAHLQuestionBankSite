lvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Given: to show that n r rU 1 has a Poisson distribution with mean nm.</text><text x="70" y="970" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Start from one side only and simplify line by line.</text><text x="70" y="1000" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Use identities/algebra legally at each step.</text><text x="70" y="1030" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Reach target form exactly. Therefore, statement is true.</text><text x="70" y="1060" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="1090" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 2</text><text x="70" y="1120" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Start from the opposite side (or use contradiction).</text><text x="70" y="1150" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Show both sides reduce to the same canonical expression.</text>
