  <text x="70" y="160" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (a) [2 marks]</text><text x="70" y="190" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Use binomial theorem on the given expression: Expand (x + h)3. (2).</text><text x="70" y="220" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Write general term T_(r+1) = nCr * a^(n-r) * b^r and apply the requested condition.</text><text x="70" y="250" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Final answer: required term/expansion/coefficient in simplest form.</text><text x="70" y="280" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="310" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (b) [4 marks]</text><text x="70" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Begin from the required statement context: Use the formula f′(x) = h xfhxf h )()(lim</text><text x="70" y="370" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">0   to show that the derivative of f(x) is 3x2 – 4. (4).</text><text x="70" y="400" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply valid identities and simplify each line clearly.</text><text x="70" y="430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 3: Arrive exactly at the target expression with no missing steps.</text><text x="70" y="460" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Conclusion: required result shown.</text><text x="70" y="490" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="520" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (c) [4 marks]</text><text x="70" y="550" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Parse the requirement from the prompt: The tangent to the curve of f at the point</text><text x="70" y="580" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">P(1, –2) is parallel to the tangent at a point Q. Find the coordinates of Q. .</text><text x="70" y="610" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply the main method with full algebraic working.</text><text x="70" y="640" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 3: Simplify and verify any stated restrictions.</text><text x="70" y="670" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Final answer: provide the required result clearly.</text><text x="70" y="700" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="730" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2a44">Part (d) [3 marks]</text><text x="70" y="760" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 1: Parse the requirement from the prompt: The graph of f is decreasing for p &lt; x &lt; q.</text><text x="70" y="790" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Find the value of p and of q. (3).</text><text x="70" y="820" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">- Step 2: Apply the main method with full algebraic working.</text><text x="70" y="850" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500