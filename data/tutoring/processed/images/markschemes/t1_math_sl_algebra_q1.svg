<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1290" viewBox="0 0 1400 1290">
  <rect x="20" y="20" width="1360" height="1250" rx="18" ry="18" fill="#f5f7fb" stroke="#c6cfdf" stroke-width="2"/>
  <rect x="20" y="20" width="1360" height="54" rx="18" ry="18" fill="#e7eef9" stroke="#c6cfdf" stroke-width="2"/>
  <text x="50" y="57" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#213a6a">Markscheme answer</text>
  <text x="70" y="110" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#243451">Q1</text>
  <text x="70" y="160" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">Part (a)</text><text x="70" y="190" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 1 (formula route)</text><text x="70" y="220" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Find d.</text><text x="70" y="250" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Arithmetic: uₙ = u₁ + (n-1)d,  Sₙ = n/2[2u₁ + (n-1)d].</text><text x="70" y="280" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Geometric: uₙ = u₁r^(n-1),  Sₙ = u₁(1-rⁿ)/(1-r), r ≠ 1.</text><text x="70" y="310" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">substitute known values</text><text x="70" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">solve for unknown (uₙ / Sₙ / n / r / d)</text><text x="70" y="370" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="400" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">ANS</text><text x="70" y="430" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">d = 3</text><text x="70" y="460" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Answer: d = 3</text><text x="70" y="490" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="520" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">Part (b)</text><text x="70" y="550" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 1 (formula route)</text><text x="70" y="580" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Find u20.</text><text x="70" y="610" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Arithmetic: uₙ = u₁ + (n-1)d,  Sₙ = n/2[2u₁ + (n-1)d].</text><text x="70" y="640" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Geometric: uₙ = u₁r^(n-1),  Sₙ = u₁(1-rⁿ)/(1-r), r ≠ 1.</text><text x="70" y="670" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">substitute known values</text><text x="70" y="700" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">solve for unknown (uₙ / Sₙ / n / r / d)</text><text x="70" y="730" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="760" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">ANS</text><text x="70" y="790" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">uₙ = u₁ + (n-1)d</text><text x="70" y="820" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">u20 = 2 + 19·3 = 59</text><text x="70" y="850" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Answer: u20 = 59</text><text x="70" y="880" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="910" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">Part (c)</text><text x="70" y="940" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1d2f57">METHOD 1 (formula route)</text><text x="70" y="970" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">Find S20.</text><text x="70" y="1000" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Arithmetic: uₙ = u₁ + (n-1)d,  Sₙ = n/2[2u₁ + (n-1)d].</text><text x="70" y="1030" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Geometric: uₙ = u₁r^(n-1),  Sₙ = u₁(1-rⁿ)/(1-r), r ≠ 1.</text><text x="70" y="1060" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">substitute known values</text><text x="70" y="1090" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">solve for unknown (uₙ / Sₙ / n / r / d)</text><text x="70" y="1120" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44"> </text><text x="70" y="1150" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#1f2a44">ANS</text><text x="70" y="1180" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Sₙ = n/2 [2u₁ + (n-1)d]</text><text x="70" y="1210" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">S20 = 20/2 [2(2) + 19(3)] = 610</text><text x="70" y="1240" font-family="Cambria Math, STIX Two Math, Times New Roman, serif" font-size="28" font-weight="500" fill="#1f2a44">Answer: S20 = 610</text>
</svg>