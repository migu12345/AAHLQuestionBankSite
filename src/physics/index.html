<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physics Bank</title>
    <link rel="stylesheet" href="../styles.css" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N2T2KWZE4M"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag("js", new Date());
      gtag("config", "G-N2T2KWZE4M");
    </script>
  </head>
  <body>
    <header class="hero">
      <div class="hero-row">
        <h1>Physics Bank</h1>
        <a class="hero-link" href="../index.html">Home</a>
      </div>
      <p>May 2025 Physics papers ready: Paper 1A, 1B and 2 (SL/HL, TZ1/TZ2/TZ3).</p>
    </header>

    <main class="layout">
      <section class="paper-picker">
        <label>
          Level
          <select id="physicsLevelFilter">
            <option value="">All levels</option>
          </select>
        </label>

        <label>
          Paper
          <select id="physicsPaperFilter">
            <option value="">All papers</option>
          </select>
        </label>

        <label>
          Time zone
          <select id="physicsTzFilter">
            <option value="">All timezones</option>
          </select>
        </label>
      </section>

      <section class="paper-launcher">
        <p id="physicsSelectionLabel" class="count-line"></p>
        <div id="physicsPaperButtons" class="paper-buttons"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
