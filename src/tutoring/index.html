<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutoring Question Bank</title>
    <link rel="stylesheet" href="../styles.css" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N2T2KWZE4M"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag("js", new Date());
      gtag("config", "G-N2T2KWZE4M");
    </script>
  </head>
  <body>
    <header class="hero">
      <div class="hero-row">
        <h1>Tutoring Question Bank</h1>
        <a class="hero-link" href="../index.html">Home</a>
      </div>
      <p>Store custom questions from tutoring sessions.</p>
    </header>

    <main class="layout tutor-layout">
      <section class="panel">
        <div class="list-header">
          <h2>Saved Tutor Questions</h2>
          <input id="searchTutorInput" type="text" placeholder="Search (e.g. q4 logarithms induction)" />
        </div>
        <section class="filters tutor-filters">
          <label>
            Subtopic
            <select id="subtopicFilter">
              <option value="">All subtopics</option>
            </select>
          </label>
          <label>
            Source File
            <select id="sourceFilter">
              <option value="">All files</option>
            </select>
          </label>
        </section>
        <p class="count-line"><strong>Note:</strong> Tutor markschemes are a work in progress.</p>
        <p id="tutorCount" class="count-line"></p>
        <div id="tutorQuestionList" class="question-list"></div>
        <div id="tutorLoadMoreWrap" style="margin-top: 0.9rem; display: none;">
          <button id="tutorLoadMoreBtn" type="button">Load more</button>
        </div>
      </section>
    </main>

    <template id="tutorQuestionTemplate">
      <article class="question-card">
        <p class="meta"></p>
        <h3 class="title"></h3>
        <div class="question-images"></div>
        <p class="question fallback-text"></p>
        <details>
          <summary>IB-style draft markscheme</summary>
          <div class="markscheme-images"></div>
          <p class="answer"></p>
        </details>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
