<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutoring Question Bank</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-row">
        <h1>Tutoring Question Bank</h1>
        <a class="hero-link" href="../index.html">Back To Main Bank</a>
      </div>
      <p>Store custom questions from tutoring sessions.</p>
    </header>

    <main class="layout tutor-layout">
      <section class="panel">
        <div class="list-header">
          <h2>Saved Tutor Questions</h2>
          <input id="searchTutorInput" type="text" placeholder="Search saved questions..." />
        </div>
        <section class="filters tutor-filters">
          <label>
            Subtopic
            <select id="subtopicFilter">
              <option value="">All subtopics</option>
            </select>
          </label>
          <label>
            Source File
            <select id="sourceFilter">
              <option value="">All files</option>
            </select>
          </label>
        </section>
        <p id="tutorCount" class="count-line"></p>
        <div id="tutorQuestionList" class="question-list"></div>
      </section>
    </main>

    <template id="tutorQuestionTemplate">
      <article class="question-card">
        <p class="meta"></p>
        <h3 class="title"></h3>
        <p class="question"></p>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
