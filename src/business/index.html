<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Management Bank</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-row">
        <h1>Business Management Bank</h1>
        <div class="hero-actions">
          <div class="hero-search" id="heroSearch">
            <button id="searchToggle" class="search-toggle" type="button" aria-label="Open search" aria-expanded="false">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
              </svg>
            </button>
            <input id="searchInput" class="hero-search-input" type="text" placeholder="Search question text" />
          </div>
          <a class="hero-link" href="../index.html">Home</a>
        </div>
      </div>
      <p>IB Business Management question bank with paper, level, topic and subtopic filters.</p>
    </header>

    <main class="layout">
      <section class="filters">
        <label>
          Level
          <select id="levelFilter">
            <option value="">All levels</option>
          </select>
        </label>

        <label>
          Paper Type
          <select id="paperTypeFilter">
            <option value="">All paper types</option>
          </select>
        </label>

        <label>
          Paper
          <select id="paperFilter">
            <option value="">All papers</option>
          </select>
        </label>

        <label>
          Topic
          <select id="topicFilter">
            <option value="">All topics</option>
          </select>
        </label>

        <label>
          Subtopic
          <select id="subtopicFilter">
            <option value="">All subtopics</option>
          </select>
        </label>
      </section>

      <section>
        <p id="resultCount"></p>
        <div id="questionList" class="question-list"></div>
        <div id="loadMoreWrap" style="margin-top: 0.9rem; display: none;">
          <button id="loadMoreBtn" type="button">Load more</button>
        </div>
      </section>
    </main>

    <template id="questionTemplate">
      <article class="question-card">
        <p class="meta"></p>
        <h3 class="title"></h3>
        <div class="question-images"></div>
        <p class="question fallback-text"></p>
        <details>
          <summary>Markscheme answer</summary>
          <div class="markscheme-images"></div>
          <p class="answer"></p>
        </details>
      </article>
    </template>

    <div id="caseStudyModal" class="case-modal" hidden>
      <div id="caseStudyBackdrop" class="case-modal-backdrop"></div>
      <div class="case-modal-panel" role="dialog" aria-modal="true" aria-labelledby="caseStudyTitle">
        <div class="case-modal-header">
          <h3 id="caseStudyTitle">Case study</h3>
          <button id="caseStudyCloseBtn" type="button" aria-label="Close case study">Close</button>
        </div>
        <div id="caseStudyBody" class="case-modal-body"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
