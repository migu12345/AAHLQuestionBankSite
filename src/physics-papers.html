<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physics Papers</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N2T2KWZE4M"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag("js", new Date());
      gtag("config", "G-N2T2KWZE4M");
    </script>
  </head>
  <body>
    <header class="hero">
      <div class="hero-row">
        <h1>Physics Papers</h1>
        <a class="hero-link" href="index.html">Home</a>
      </div>
      <p>Select level, year, session, timezone, then open the exact physics paper in exam mode.</p>
    </header>

    <main class="layout">
      <section class="paper-picker">
        <label>
          Level
          <select id="paperLevelFilter">
            <option value="">Choose level</option>
          </select>
        </label>

        <label>
          Year
          <select id="paperYearFilter">
            <option value="">Choose year</option>
          </select>
        </label>

        <label>
          Session
          <select id="paperSessionFilter">
            <option value="">Choose session</option>
          </select>
        </label>

        <label>
          Time zone
          <select id="paperTzFilter">
            <option value="">Choose timezone</option>
          </select>
        </label>
      </section>

      <section class="paper-launcher">
        <p id="paperSelectionLabel" class="count-line"></p>
        <div id="paperButtons" class="paper-buttons"></div>
      </section>
    </main>

    <script src="asset-base.js"></script>
    <script src="physics-papers.js"></script>
  </body>
</html>
